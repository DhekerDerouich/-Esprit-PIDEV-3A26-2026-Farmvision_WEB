security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\Utilisateur:
            algorithm: auto

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard_redirect
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Front - Agriculteur uniquement (CRUD)
        - { path: ^/equipements/new, roles: ROLE_AGRICULTEUR }
        - { path: ^/equipements/[0-9]+/edit, roles: ROLE_AGRICULTEUR }
        - { path: ^/equipements/[0-9]+/delete, roles: ROLE_AGRICULTEUR }
        - { path: ^/maintenances/new, roles: ROLE_AGRICULTEUR }
        - { path: ^/maintenances/[0-9]+/edit, roles: ROLE_AGRICULTEUR }
        - { path: ^/maintenances/[0-9]+/delete, roles: ROLE_AGRICULTEUR }
        - { path: ^/maintenances/[0-9]+/complete, roles: ROLE_AGRICULTEUR }
        # Front - Consultation (tous les utilisateurs connectés)
        - { path: ^/equipements, roles: ROLE_USER }
        - { path: ^/maintenances, roles: ROLE_USER }
        - { path: ^/admin/stocks, roles: ROLE_ADMIN }
        - { path: ^/admin/marketplace, roles: ROLE_ADMIN }
        - { path: ^/stocks, roles: ROLE_USER }
        - { path: ^/marketplace, roles: PUBLIC_ACCESS }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_RESPONSABLE, ROLE_AGRICULTEUR, ROLE_USER]
        ROLE_RESPONSABLE: [ROLE_AGRICULTEUR, ROLE_USER]

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            App\Entity\Utilisateur:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon