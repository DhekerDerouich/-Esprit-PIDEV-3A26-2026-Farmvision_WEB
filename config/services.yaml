# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Gemini AI Service (now using OpenRouter)
    App\Service\GeminiAIService:
    App\Service\ImageUploadService:
        arguments:
            $apiKey: '%env(OPENROUTER_API_KEY)%'

    # Weather Service
    App\CultureParcelle\Service\WeatherService:
        arguments:
            $apiKey: '%env(OPENWEATHER_API_KEY)%'
    App\Service\ProfileImageUploader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # SMS Service
    App\Service\SmsService:
        arguments:
            $accountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(TWILIO_FROM_NUMBER)%'
            $enabled: '%env(bool:TWILIO_ENABLED)%'

when@test:
    services:
        _defaults:
            public: true
    App\Service\ImageAnalysisService:
        arguments:
            $apiKey: '%env(OPENAI_API_KEY)%'

    App\Service\OpenFoodFactsService:
        autowire: true

    App\CultureParcelle\Service\WeatherService:
        arguments:
            $apiKey: '%env(OPENWEATHER_API_KEY)%'

    App\Service\InvoiceService:
        arguments:
            $invoiceDir: '%kernel.project_dir%/var/invoices'

    App\Service\StripeService:
        arguments:
            $secretKey: '%env(STRIPE_SECRET_KEY)%'
            $publicKey: '%env(STRIPE_PUBLIC_KEY)%'

    App\Command\CheckStockAlertCommand:
        tags:
            - { name: console.command }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
