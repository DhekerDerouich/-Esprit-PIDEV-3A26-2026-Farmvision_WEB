parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Gemini AI Service (now using OpenRouter)
    App\Service\GeminiAIService:
        arguments:
            $apiKey: '%env(OPENROUTER_API_KEY)%'

    # Weather Service
    App\CultureParcelle\Service\WeatherService:
        arguments:
            $apiKey: '%env(OPENWEATHER_API_KEY)%'

    # SMS Service
    App\Service\SmsService:
        arguments:
            $accountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(TWILIO_FROM_NUMBER)%'
            $enabled: '%env(bool:TWILIO_ENABLED)%'

when@test:
    services:
        _defaults:
            public: true
